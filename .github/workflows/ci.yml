name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test
      - name: Swift tests
        run: |
          cargo build --release -p velo-ffi
          cd shell-macos && swift test
      - name: Apple symbol lint
        run: ./scripts/lint-apple-symbols.sh
