name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust workspace tests
        run: cargo test --workspace

      - name: Build UniFFI library
        run: cargo build --release -p velo-ffi

      - name: Generate UniFFI Swift bindings
        run: |
          cargo run -p velo-ffi --bin uniffi-bindgen -- generate \
            --library target/release/libvelo_ffi.dylib \
            --language swift \
            --out-dir shell-macos/Generated
          cp shell-macos/Generated/velo_ffiFFI.h shell-macos/Bridge/include/velo_ffiFFI.h

      - name: Swift tests
        run: cd shell-macos && swift test

      - name: Apple symbol lint
        run: ./scripts/lint-apple-symbols.sh

      - name: Route import CLI smoke test
        run: |
          cargo build -p velo-route-import --bin velo-route-import
          cargo build -p velo-terrain --bin velo-terrain
